<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="styless.css">
</head>
<body>

    <header class="header">
        <h1>Contáctanos</h1>
        <p>Estamos aquí para ayudarte</p>
    </header>

    <section class="contact-container">
        <form class="contact-form">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" placeholder="Tu nombre" required>
            </div>

            <div class="form-group">
                <label>Correo electrónico</label>
                <input type="email" placeholder="ejemplo@email.com" required>
            </div>

            <div class="form-group">
                <label>Mensaje</label>
                <textarea rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>
        </form>

        <div class="contact-info">
            <h2>Información</h2>
            <p><strong>Email:</strong> contacto@empresa.com</p>
            <p><strong>Teléfono:</strong> +52 999 123 4567</p>
            <p><strong>Dirección:</strong> Mérida, Yucatán</p>
        </div>
    </section>

</body>
</html>
